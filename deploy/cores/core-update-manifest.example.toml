[xray]
repo = "XTLS/Xray-core"
binary = "xray"
service = "stealthhub-xray.service"
active = "/opt/stealthhub/cores/xray/current"
config = "/etc/stealthhub-cores/xray/config.json"

[sing_box]
repo = "SagerNet/sing-box"
binary = "sing-box"
service = "stealthhub-sing-box.service"
active = "/opt/stealthhub/cores/sing-box/current"
config = "/etc/stealthhub-cores/sing-box/config.json"

[hysteria]
repo = "apernet/hysteria"
binary = "hysteria"
service = "stealthhub-hysteria.service"
active = "/opt/stealthhub/cores/hysteria/current"
config = "/etc/stealthhub-cores/hysteria/config.yaml"

[tuic]
repo = "tuic-protocol/tuic"
binary = "tuic-server"
service = "stealthhub-tuic.service"
active = "/opt/stealthhub/cores/tuic/current"
config = "/etc/stealthhub-cores/tuic/config.json"
