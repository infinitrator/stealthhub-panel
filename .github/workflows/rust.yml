name: Rust

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x deploy/bootstrap.sh deploy/install.sh deploy/panel-update.sh deploy/module-update.sh deploy/cores/install-core.sh deploy/infiproxy-manager.sh deploy/infiproxy-profile.sh

      - name: Deployment contracts
        run: |
          set -euo pipefail
          for file in deploy/*.sh deploy/cores/*.sh; do bash -n "$file"; done
          PYTHONDONTWRITEBYTECODE=1 python3 deploy/module-manifest.py list deploy/modules.d
          bash deploy/install.sh --check
          bash deploy/bootstrap.sh --check --src-dir "$PWD"

      - name: Dependency audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
